<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Reports | Greenleaf Acupuncture &amp; Herb Clinic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF;
    --bg-warm: #FAFAF6;
    --lime: #B5CF37;
    --lime-soft: #EEF3D8;
    --salmon: #EB7055;
    --salmon-soft: #FCEAE4;
    --ink: #22261A;
    --text-2: #5B6152;
    --text-3: #8B9180;
    --border: #E7E7DE;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Mulish', sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px; border-bottom: 1px solid var(--border);
  }
  .brand { font-weight: 800; font-size: 15px; letter-spacing: 0.02em; }
  .brand span { color: var(--lime); }
  .topbar-link { font-size: 13px; font-weight: 600; color: var(--text-2); }
  .topbar-link:hover { color: var(--ink); }

  .hero { max-width: 720px; margin: 0 auto; padding: 56px 24px 8px; text-align: left; }
  .hero-eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--lime); margin-bottom: 14px;
  }
  .hero h1 {
    font-size: 32px; font-weight: 800; line-height: 1.3; letter-spacing: -0.01em;
    margin: 0 0 12px; max-width: 20ch;
  }
  .hero p { font-size: 16px; color: var(--text-2); line-height: 1.6; margin: 0 0 32px; max-width: 52ch; }

  .search-wrap { max-width: 720px; margin: 0 auto; padding: 0 24px; }
  .search-box {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-warm); border: 1px solid var(--border); border-radius: 12px;
    padding: 0 16px; height: 50px;
  }
  .search-box svg { flex-shrink: 0; opacity: 0.5; }
  .search-box input {
    border: none; background: transparent; outline: none; flex: 1;
    font-family: 'Mulish', sans-serif; font-size: 15px; color: var(--ink); height: 100%;
  }
  .search-box input::placeholder { color: var(--text-3); }

  .layout {
    max-width: 720px; margin: 0 auto; padding: 28px 24px 100px;
    display: flex; gap: 40px;
  }
  .filters {
    flex: 0 0 168px; display: flex; flex-direction: column; gap: 2px; padding-top: 4px;
  }
  .filter-btn {
    text-align: left; background: transparent; border: none; cursor: pointer;
    padding: 9px 12px; border-radius: 10px; font-family: 'Mulish', sans-serif;
    font-size: 14px; color: var(--text-2); display: flex; justify-content: space-between; gap: 8px;
  }
  .filter-btn:hover { background: var(--bg-warm); }
  .filter-btn.active { background: var(--lime-soft); color: #4A5A18; font-weight: 700; }
  .filter-btn .count { color: var(--text-3); font-weight: 500; font-size: 12px; }
  .filter-btn.active .count { color: #6B7D2B; }
  .filter-empty {
    padding: 9px 12px; font-size: 13px; color: var(--text-3); opacity: 0.55;
  }
  .filter-divider { height: 14px; }

  .results { flex: 1; min-width: 0; }
  .result-count { font-size: 13px; color: var(--text-3); margin-bottom: 4px; padding: 0 2px; }

  .case-row {
    padding: 18px 2px; border-bottom: 1px solid var(--border); display: block;
  }
  .case-row:hover .case-title { color: var(--lime); }
  .case-title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; }
  .case-title { font-size: 15.5px; font-weight: 700; color: var(--ink); }
  .weeks-badge { flex-shrink: 0; font-size: 12px; font-weight: 700; color: var(--salmon); background: var(--salmon-soft); padding: 3px 11px; border-radius: 100px; white-space: nowrap; }
  .case-summary { font-size: 13.5px; color: var(--text-2); margin-top: 5px; line-height: 1.5; }
  .case-cat { font-size: 12px; color: var(--text-3); margin-top: 7px; font-weight: 600; }

  .empty-state { padding: 48px 0; text-align: center; }
  .empty-state p { font-size: 14px; color: var(--text-3); margin: 0; }

  @media (max-width: 640px) {
    .topbar { padding: 16px 20px; }
    .hero { padding: 40px 20px 4px; }
    .hero h1 { font-size: 26px; }
    .layout { flex-direction: column; padding: 24px 20px 80px; }
    .filters {
      flex-direction: row; flex-wrap: wrap; gap: 8px; padding-top: 0;
    }
    .filter-btn { padding: 7px 12px; border: 1px solid var(--border); border-radius: 100px; }
    .filter-btn.active { border-color: var(--lime); }
    .filter-empty { display: none; }
    .filter-divider { display: none; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <a class="brand" href="index.html">Greenleaf <span>Case Reports</span></a>
    <a class="topbar-link" href="index.html">&larr; Home</a>
  </div>

  <div class="hero">
    <div class="hero-eyebrow">35 Real Patient Cases</div>
    <h1>Find a case like yours</h1>
    <p>Every story here follows a real patient, from the symptoms they came in with to how treatment actually unfolded. Search by symptom, or browse by condition.</p>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="q" type="text" placeholder="Try a symptom — e.g. insomnia, stomach, headache">
    </div>
  </div>

  <div class="layout">
    <div class="filters" id="filters"></div>
    <div class="results">
      <div class="result-count" id="resultCount"></div>
      <div id="list"></div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <p>No cases match that search yet. Try a different word.</p>
      </div>
    </div>
  </div>

<script>
const CATEGORY_ORDER = [
  "Mental Health","Fertility","Uterine Conditions","Pain","Digestive Issues",
  "Men's Health","Skin Conditions","Pediatrics","Cancer & Chemotherapy","ENT (Ear, Nose & Throat)"
];

let cases = [];
let active = "All";

async function loadCases(){
  try {
    const res = await fetch('cases.json');
    cases = await res.json();
  } catch(e) {
    document.getElementById('list').innerHTML = '<div class="empty-state"><p>Could not load cases.json. This page needs to be served over http (e.g. via GitHub Pages or a local server), not opened directly as a file.</p></div>';
    return;
  }
  // Pick up state passed in from the homepage (category tiles / search box)
  const params = new URLSearchParams(window.location.search);
  const catParam = params.get('cat');
  const qParam = params.get('q');
  if (catParam) active = catParam;
  if (qParam) document.getElementById('q').value = qParam;

  renderFilters();
  renderList();
}

function countFor(cat){
  return cases.filter(c => c.cat === cat).length;
}

function renderFilters(){
  const filtersEl = document.getElementById('filters');
  const present = CATEGORY_ORDER.filter(c => countFor(c) > 0);
  const empty = CATEGORY_ORDER.filter(c => countFor(c) === 0);

  let html = `<button class="filter-btn ${active==='All'?'active':''}" data-cat="All">All <span class="count">${cases.length}</span></button>`;
  html += present.map(c => `<button class="filter-btn ${active===c?'active':''}" data-cat="${c}">${c} <span class="count">${countFor(c)}</span></button>`).join('');
  if (empty.length){
    html += '<div class="filter-divider"></div>';
    html += empty.map(c => `<div class="filter-empty">${c}</div>`).join('');
  }
  filtersEl.innerHTML = html;
  filtersEl.querySelectorAll('.filter-btn').forEach(b=>{
    b.addEventListener('click', ()=>{ active = b.dataset.cat; renderFilters(); renderList(); });
  });
}

function renderList(){
  const query = document.getElementById('q').value.trim().toLowerCase();
  let filtered = active === 'All' ? cases : cases.filter(c => c.cat === active);
  if (query){
    filtered = filtered.filter(c =>
      c.title.toLowerCase().includes(query) ||
      c.summary.toLowerCase().includes(query) ||
      (c.kw_en || '').toLowerCase().includes(query)
    );
  }
  const listEl = document.getElementById('list');
  const emptyEl = document.getElementById('emptyState');
  const countEl = document.getElementById('resultCount');

  countEl.textContent = filtered.length ? `${filtered.length} case${filtered.length===1?'':'s'}` : '';

  if (!filtered.length){
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';
  listEl.innerHTML = filtered.map(c => `
    <a class="case-row" href="cases/${c.slug}.html">
      <div class="case-title-row">
        <span class="case-title">${c.title}</span>
        <span class="weeks-badge">Recovered in ${c.weeks}</span>
      </div>
      <div class="case-summary">${c.summary}</div>
      <div class="case-cat">${c.cat}</div>
    </a>
  `).join('');
}

document.getElementById('q').addEventListener('input', renderList);
loadCases();
</script>
</body>
</html>
